{% extends "base.html" %}

{% block title %}404 Not Found — Bugloo{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center min-h-[calc(100vh-16rem)]">
    <div class="text-center bg-snow-white border-2 border-cloud-gray rounded-cards p-12 max-w-md shadow-sm relative overflow-hidden flex flex-col items-center">
        <!-- Top accent decoration -->
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-bubblegum-pink"></div>
        
        <h1 class="font-display text-8xl text-bubblegum-pink mb-2 animate-bounce">404</h1>
        <h3 class="font-display text-3xl text-almost-black uppercase mb-2">Page Not Found</h3>
        <p class="text-sm text-graphite font-bold uppercase tracking-wide mb-8">This page doesn't exist on Bugloo.</p>
        
        <a href="/" class="btn-3d-green text-xs uppercase px-8 py-3.5">
            Go Home
        </a>
    </div>
</div>
{% endblock %}
